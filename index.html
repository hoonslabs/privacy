<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policies — hoonslabs</title>
  <meta name="description" content="hoonslabs 앱 개인정보 처리방침 목록" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:    #4A7C59;
      --cream:   #F7F4EF;
      --surface: #FFFFFF;
      --charcoal:#2C2C2C;
      --muted:   #7A9E87;
      --border:  #E2DDD6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --cream:   #1A1F17;
        --surface: #252E21;
        --charcoal:#F0EDE8;
        --border:  #344030;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #4A7C59 0%, #2D5C3F 100%);
      color: #fff;
      padding: 48px 24px 40px;
      text-align: center;
    }

    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    header p {
      font-size: 14px;
      opacity: 0.75;
    }

    /* ── Main ── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 24px;
      flex: 1;
      width: 100%;
    }

    h2 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── App Card ── */
    .app-list { display: flex; flex-direction: column; gap: 12px; }

    .app-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
    }

    .app-card:hover {
      border-color: var(--sage);
      transform: translateY(-1px);
    }

    .app-card-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .app-icon.virmina {
      background: linear-gradient(135deg, #4A7C59, #2D5C3F);
    }

    .app-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .app-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .chevron {
      color: var(--muted);
      font-size: 18px;
      font-weight: 300;
    }

    /* ── Coming Soon Card ── */
    .app-card.coming-soon {
      opacity: 0.5;
      pointer-events: none;
      border-style: dashed;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: color-mix(in srgb, var(--sage) 12%, transparent);
      color: var(--sage);
      border-radius: 6px;
      padding: 3px 8px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <p class="brand">hoonslabs</p>
  <h1>Privacy Policies</h1>
  <p>개인정보 처리방침 / Privacy Policy</p>
</header>

<main>
  <h2>Apps</h2>
  <div class="app-list">

    <a class="app-card" href="./virmina/">
      <div class="app-card-left">
        <div class="app-icon virmina">🌱</div>
        <div>
          <div class="app-name">Virmina</div>
          <div class="app-desc">Minimalist Habit Tracker</div>
        </div>
      </div>
      <span class="chevron">›</span>
    </a>

    <!-- 새 앱 추가 시 아래 블록을 복사하고 coming-soon 클래스를 제거하세요 -->
    <div class="app-card coming-soon">
      <div class="app-card-left">
        <div class="app-icon" style="background:#e2ddd6;">🚀</div>
        <div>
          <div class="app-name">Next App</div>
          <div class="app-desc">Coming soon</div>
        </div>
      </div>
      <span class="badge">Soon</span>
    </div>

  </div>
</main>

<footer>
  © 2026 hoonslabs. All rights reserved.
</footer>

<script>
  // 브라우저 언어에 따라 UI 언어 선택 (단순 표시 전용)
  if (!navigator.language.startsWith('ko')) {
    document.querySelector('header p').textContent = 'Privacy Policy';
    document.querySelector('h2').textContent = 'Apps';
  }
</script>

</body>
</html>
